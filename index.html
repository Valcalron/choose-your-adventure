<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>Choose Your Path</title>
    <style>
      .character-strip {
        display: none !important;
      }

      .save-notification {
        margin: 0 0 22px;
        padding: 12px 14px;
        border: 1px solid #475569;
        border-radius: 10px;
        font-weight: 800;
      }

      .save-notification.success {
        color: #d1fae5;
        background: rgba(6, 78, 59, 0.72);
        border-color: #10b981;
      }

      .save-notification.pending {
        color: #dbeafe;
        background: rgba(30, 64, 175, 0.5);
        border-color: #60a5fa;
      }

      .save-notification.error {
        color: #fee2e2;
        background: rgba(127, 29, 29, 0.65);
        border-color: #f87171;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
